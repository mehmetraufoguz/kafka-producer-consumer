version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: kafka-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_comments
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: kafka-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka-broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - '9092:9092'
      - '9093:9093'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions.sh --bootstrap-server localhost:9092']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: kafka-producer
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: producer
      PRODUCER_MIN_DELAY: 100
      PRODUCER_MAX_DELAY: 10000
      PRODUCER_DUPLICATE_RATE: 0.05
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: kafka-consumer
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: consumer
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_comments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL: 10800
      CONSUMER_MAX_RETRIES: 5
      CONSUMER_RETRY_DELAY: 1000
      CONSUMER_CACHE_SIZE: 100
      SENTIMENT_GRPC_URL: sentiment:3004
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentiment:
        condition: service_started
    restart: unless-stopped

  sentiment:
    build:
      context: .
      dockerfile: sentiment/Dockerfile
    container_name: kafka-sentiment
    environment:
      SENTIMENT_CACHE_SIZE: 500
      SENTIMENT_RATE_LIMIT: 100
      SENTIMENT_FAILURE_RATE: 0.03125
      SENTIMENT_GRPC_PORT: 3004
    ports:
      - '3004:3004'
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: kafka-api
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_comments
      API_PORT: 3001
      API_CORS_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: kafka-dashboard
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
